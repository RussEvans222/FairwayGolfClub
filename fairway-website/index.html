<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fairway Golf Club — Coming Soon</title>
<meta name="description" content="The First AI-Powered Golf Improvement Club. Coming to Lorton, Virginia.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #D4A853;
  --navy: #1B2A4A;
  --cream: #FAF8F5;
  --dark: #0F1A2E;
  --gray: #64748B;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--dark);
  color: white;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  text-align: center;
}
.container {
  max-width: 600px;
  width: 100%;
}
.logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 3.5rem;
  color: var(--gold);
  letter-spacing: 6px;
  line-height: 1.1;
  margin-bottom: 0.5rem;
}
.divider {
  width: 80px;
  height: 3px;
  background: var(--gold);
  margin: 1.5rem auto;
}
.tagline {
  font-size: 1.1rem;
  color: var(--gold);
  font-style: italic;
  margin-bottom: 0.5rem;
}
.location {
  font-size: 0.85rem;
  color: var(--gray);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 3rem;
}
.coming-soon {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 4px;
  color: var(--gray);
  margin-bottom: 1.5rem;
}
.signup-form {
  display: flex;
  gap: 0.5rem;
  max-width: 420px;
  margin: 0 auto 1rem;
}
.signup-form input {
  flex: 1;
  padding: 0.85rem 1.2rem;
  border: 1px solid rgba(212,168,83,0.3);
  border-radius: 6px;
  background: rgba(255,255,255,0.05);
  color: white;
  font-size: 0.9rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.signup-form input::placeholder { color: var(--gray); }
.signup-form input:focus { border-color: var(--gold); }
.signup-form button {
  padding: 0.85rem 1.5rem;
  background: var(--gold);
  color: var(--dark);
  border: none;
  border-radius: 6px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  white-space: nowrap;
}
.signup-form button:hover { background: #E5B963; }
.note {
  font-size: 0.75rem;
  color: var(--gray);
  margin-top: 0.5rem;
}
.success-msg {
  display: none;
  color: var(--gold);
  font-size: 0.95rem;
  padding: 1rem;
}
footer {
  position: fixed;
  bottom: 2rem;
  font-size: 0.7rem;
  color: rgba(255,255,255,0.2);
  letter-spacing: 1px;
}
@media (max-width: 500px) {
  .logo-text { font-size: 2.5rem; letter-spacing: 4px; }
  .signup-form { flex-direction: column; }
}
</style>
</head>
<body>
<div class="container">
  <p class="coming-soon">Coming 2027</p>
  <h1 class="logo-text">FAIRWAY<br>GOLF CLUB</h1>
  <div class="divider"></div>
  <p class="tagline">The First AI-Powered Golf Improvement Club</p>
  <p class="location">Lorton, Virginia</p>

  <form class="signup-form" id="signupForm">
    <input type="email" placeholder="Enter your email for updates" required id="emailInput">
    <button type="submit">Notify Me</button>
  </form>
  <p class="note">Be the first to know when we open. No spam.</p>
  <p class="success-msg" id="successMsg">You're on the list. We'll be in touch.</p>
</div>

<footer>&copy; 2026 Fairway Golf Club LLC</footer>

<script>
document.getElementById('signupForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const email = document.getElementById('emailInput').value;
  // Store locally for now — replace with Formspree/Mailchimp later
  console.log('Signup:', email);
  this.style.display = 'none';
  document.querySelector('.note').style.display = 'none';
  document.getElementById('successMsg').style.display = 'block';
});
</script>
</body>
</html>
