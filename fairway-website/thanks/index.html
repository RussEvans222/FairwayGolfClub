<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Fairway Golf Club</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: #0a0a0a;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
  -webkit-font-smoothing: antialiased;
}
.check {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 2px solid #C9A84C;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  color: #C9A84C;
  margin: 0 auto 2rem;
}
.brand {
  font-size: .7rem;
  letter-spacing: .25em;
  text-transform: uppercase;
  color: #C9A84C;
  margin-bottom: 1.5rem;
}
h1 {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: clamp(2.2rem, 5.5vw, 3.4rem);
  font-weight: 400;
  margin-bottom: 1rem;
  color: #fff;
}
p {
  color: rgba(255,255,255,.55);
  font-size: 1rem;
  line-height: 1.7;
  max-width: 460px;
  margin: 0 auto 2.5rem;
}
.divider {
  width: 40px;
  height: 2px;
  background: #C9A84C;
  margin: 0 auto 1.5rem;
}
.back-link {
  display: inline-block;
  font-size: .8rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: rgba(255,255,255,.4);
  text-decoration: none;
  border-bottom: 1px solid rgba(255,255,255,.15);
  padding-bottom: 2px;
  transition: color .2s, border-color .2s;
}
.back-link:hover { color: #C9A84C; border-color: #C9A84C; }
</style>
</head>
<body>
  <div class="brand">Fairway Golf Club</div>
  <div class="check">✓</div>
  <h1>Got it. I'll be in touch.</h1>
  <div class="divider"></div>
  <p>Thanks for reaching out. I'll follow up within 24 hours to answer your questions and walk you through everything in person.</p>
  <a class="back-link" href="/">← Back to fairwaygolfclub.co</a>
</body>
</html>
