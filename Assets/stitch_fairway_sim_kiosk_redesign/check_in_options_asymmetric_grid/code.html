<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        
        .premium-grain {
            position: relative;
        }
        .premium-grain::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            opacity: 0.05;
            pointer-events: none;
            z-index: 10;
        }

        .bevel-edge {
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.1), inset 0 -1px 0 0 rgba(0, 0, 0, 0.5);
        }

        .inner-pressed:active {
            box-shadow: inset 0 4px 8px 0 rgba(0, 0, 0, 0.6);
            transform: scale(0.995);
        }

        .wood-gradient {
            background: linear-gradient(135deg, rgba(104, 63, 32, 0.1) 0%, rgba(19, 19, 19, 0) 100%);
        }

        .gold-leaf {
            background: linear-gradient(45deg, #e9c349 0%, #ffe088 50%, #e9c349 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-transition {
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
    </style>

<body class="bg-background text-on-background overflow-hidden selection:bg-tertiary selection:text-on-tertiary h-screen w-screen premium-grain">

<div class="absolute inset-0 flex flex-col items-center justify-center p-gutter text-center z-20">
<span class="material-symbols-outlined text-tertiary text-7xl mb-6 opacity-80 group-hover:scale-110 transition-transform">calendar_today</span>
<h2 class="font-headline-lg text-[64px] text-white mb-6 leading-tight">

<div class="mt-16 w-24 h-1 bg-tertiary/30 group-hover:w-48 transition-all duration-500"></div>
</div>
<div class="absolute inset-0 inner-pressed z-30"></div>
</div>
<!-- Right Side: Stacked Options (1/3 width) -->
<div class="flex flex-col w-1/3 h-full">
<!-- Option 2: Member Walk-In (Top half of right column) -->
<div class="group relative flex-1 cursor-pointer overflow-hidden card-transition border-b border-white/5 active:scale-[0.97] duration-150 ease-in-out" onclick="location.href='#'">
<div class="absolute inset-0 bg-cover bg-center card-transition group-hover:scale-110" data-alt="A close-up of a premium gold-embossed member card." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAt3BL_ecVn2ir9Vadje7W_h69FdFCbsOar9KQCpwJfNO8c3UnLeMVBoVq2VRVmQfiQGMl479IQ-DAhDxBwSx0q-cMp1XmP755mVZ5knu3Qe0V8pfJ5LlRJp21lgRBQTHb05t02agT7bIr2JKFDR_gU1C46XR7qBksGUD9sjJQfaEA92vXRTd8fCnX_2ewXv8YQq9Qy4Dg1AQ9G-nw19_MZCAkBPM3WSIxVQ4AfWFgbz-2GRrWtuBk')">

</div>

<button class="pointer-events-auto flex items-center gap-3 px-10 py-5 bg-surface-container-low border border-tertiary/20 rounded-full shadow-2xl bevel-edge hover:bg-surface-bright/20 transition-all active:scale-95 group">
<span class="material-symbols-outlined text-tertiary group-hover:-translate-x-1 transition-transform">arrow_back</span>
<span class="font-label-lg text-label-lg text-on-surface uppercase tracking-widest">Back</span>
</button>
</footer>
<!-- Atmosphere Overlay: Fine Vignette -->
<div class="fixed inset-0 pointer-events-none bg-[radial-gradient(circle_at_center,transparent_0%,rgba(0,0,0,0.4)_100%)] z-40"></div>
<script>
        // Simple touch interaction feedback
        document.querySelectorAll('.inner-pressed').forEach(button => {
            button.addEventListener('touchstart', () => {
                button.parentElement.classList.add('brightness-75');
            });
            button.addEventListener('touchend', () => {
                button.parentElement.classList.remove('brightness-75');
            });
        });
    </script>
